name: Build Q-WRT x86_64

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Q-WRT/Q-WRT
  REPO_BRANCH: Q-WRT-21.02
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-distutils \
            python3-setuptools rsync unzip zlib1g-dev file wget curl \
            subversion swig time

      - name: Clone Q-WRT source
        run: |
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Custom feeds
        run: |
          cd openwrt
          bash ../diy-part1.sh

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom source
        run: |
          cd openwrt
          bash ../diy-part2.sh

      - name: Load x86_64 config
        run: |
          cp .config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download source packages
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        run: |
          cd openwrt
          make -j"$(nproc)" || make -j1 V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Q-WRT-x86_64-N100-firmware
          path: openwrt/bin/targets/x86/64/

